<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="globe-clip">
      <circle cx="114" cy="110" r="74"/>
    </clipPath>
  </defs>

  <!-- Knowit ink background -->
  <rect width="256" height="256" rx="40" fill="#0B0B26"/>

  <!-- Globe: outer circle (cream) -->
  <circle cx="114" cy="110" r="74" fill="none" stroke="#FEFBE6" stroke-width="7" stroke-linecap="round"/>

  <!-- Globe: equator -->
  <line x1="40" y1="110" x2="188" y2="110"
        stroke="#FEFBE6" stroke-width="5" stroke-linecap="round" opacity="0.45"
        clip-path="url(#globe-clip)"/>

  <!-- Globe: latitude lines -->
  <line x1="54" y1="78"  x2="174" y2="78"
        stroke="#FEFBE6" stroke-width="4" stroke-linecap="round" opacity="0.28"
        clip-path="url(#globe-clip)"/>
  <line x1="54" y1="142" x2="174" y2="142"
        stroke="#FEFBE6" stroke-width="4" stroke-linecap="round" opacity="0.28"
        clip-path="url(#globe-clip)"/>

  <!-- Globe: center meridian (vertical line) -->
  <line x1="114" y1="36" x2="114" y2="184"
        stroke="#FEFBE6" stroke-width="4" stroke-linecap="round" opacity="0.35"
        clip-path="url(#globe-clip)"/>

  <!-- Globe: side meridian arc (ellipse) -->
  <ellipse cx="114" cy="110" rx="34" ry="74"
           fill="none" stroke="#FEFBE6" stroke-width="4" opacity="0.28"
           clip-path="url(#globe-clip)"/>

  <!-- Magnifying glass (violet) — audit / scan -->
  <circle cx="187" cy="191" r="26" fill="none" stroke="#9795FF" stroke-width="8" stroke-linecap="round"/>
  <line x1="206" y1="210" x2="228" y2="232" stroke="#9795FF" stroke-width="8" stroke-linecap="round"/>
</svg>
